<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="sidebar.css" />
  <title>LI Facilitator</title>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 114.126 0 2.063 2.063 0 01-2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </div>
        <span class="brand-name">LI Facilitator</span>
      </div>
    </header>

    <div id="auth-section" class="panel hidden">
      <div class="auth-hero">
        <h2>Apply smarter</h2>
        <p>Sign in to extract job details and generate tailored resumes.</p>
      </div>
      <button id="btn-signin" class="btn btn-primary">Sign In</button>
      <button id="btn-signup" class="btn btn-secondary">Sign Up</button>
    </div>

    <div id="main-section" class="panel hidden">
      <div class="main-scroll">
      <div class="user-bar">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-meta">
          <span id="user-email" class="user-email">—</span>
          <span class="user-label">Signed in</span>
        </div>
        <button id="btn-signout" class="btn-ghost">Sign out</button>
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <label class="field-label" for="profile-select">Profile</label>
          <button id="btn-refresh-profiles" type="button" class="btn-ghost btn-refresh">Refresh</button>
        </div>
        <select id="profile-select" class="field-select">
          <option value="">Select a profile...</option>
        </select>
        <div id="profile-application-notice" class="profile-application-notice hidden" role="status"></div>
        <a id="dashboard-link" class="field-hint" href="#" target="_blank">Manage profiles in dashboard →</a>
      </div>

      <div id="no-job" class="notice hidden">
        <p>Open a LinkedIn job posting, then extract the description.</p>
        <button id="btn-refresh-jd-empty" type="button" class="btn btn-secondary btn-refresh-inline">Refresh JD</button>
      </div>

      <div id="job-panel" class="job-panel hidden">
        <div class="job-meta-card">
          <div class="company-avatar" id="company-avatar">?</div>
          <div>
            <h3 id="job-title" class="job-title">—</h3>
            <p id="job-company" class="job-company">—</p>
          </div>
        </div>

        <div id="job-skills" class="skills"></div>
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <label class="field-label" for="jd-text">Job Description</label>
          <button id="btn-refresh-jd" type="button" class="btn-ghost btn-refresh">Refresh JD</button>
        </div>
        <div class="jd-editor">
          <div id="jd-highlight" class="jd-highlight" aria-hidden="true"></div>
          <textarea
            id="jd-text"
            class="field-textarea field-textarea-readonly jd-text"
            rows="10"
            readonly
            placeholder="Job description will appear here when extracted from LinkedIn..."
          ></textarea>
        </div>
      </div>

      <div id="skills-group" class="field-group">
        <div class="field-label-row">
          <label class="field-label" for="skills-text">AI Extracted Skills (JSON)</label>
          <button id="btn-extract-skills" type="button" class="btn-ghost btn-refresh" disabled>Extract Skills</button>
        </div>
        <textarea
          id="skills-text"
          class="field-textarea"
          rows="12"
          placeholder='Click "Extract Skills" to analyze the job description with AI, or edit the JSON directly.'
        ></textarea>
      </div>

      <div id="company-bullets-section" class="field-group">
        <div class="field-label-row">
          <label class="field-label" for="company-bullets-list">Resume Bullets by Company</label>
          <button
            id="btn-generate-all-bullets"
            type="button"
            class="btn-ghost btn-refresh"
            disabled
          >
            Generate All Resume Bullets
          </button>
        </div>
        <div id="company-bullets-list" class="company-bullets-list"></div>
      </div>

      <div id="job-cost-panel" class="job-cost-panel">
        <div class="job-cost-row">
          <span class="job-cost-label">Skill extraction</span>
          <span id="job-cost-skills" class="job-cost-value">$0.00</span>
        </div>
        <div class="job-cost-row">
          <span class="job-cost-label">Resume bullets</span>
          <span id="job-cost-bullets" class="job-cost-value">$0.00</span>
        </div>
        <div class="job-cost-row job-cost-total">
          <span class="job-cost-label">Total</span>
          <strong id="job-cost-total" class="job-cost-value">$0.00</strong>
        </div>
      </div>
      </div>

      <div class="bottom-dock">
        <div id="resume-result" class="resume-result">
          <div class="resume-result-meta">
            <span class="field-label">Generated resume</span>
            <span id="resume-result-name" class="resume-result-name">—</span>
          </div>
          <button id="btn-download-resume" type="button" class="btn btn-primary">
            Download Resume
          </button>
        </div>

        <div class="actions">
          <button id="btn-one-click-done" type="button" class="btn btn-primary" disabled>
            One-Click Done
          </button>
          <button id="btn-generate" type="button" class="btn btn-secondary" disabled>
            Generate Resume
          </button>
          <button id="btn-applied" type="button" class="btn btn-secondary" disabled>
            Applied
          </button>
        </div>
      </div>

      <div id="workflow-overlay" class="workflow-overlay hidden" aria-live="polite" aria-busy="false">
        <div class="workflow-overlay-card">
          <div class="workflow-spinner" aria-hidden="true"></div>
          <p id="workflow-overlay-message" class="workflow-overlay-message">Working...</p>
        </div>
      </div>

      <div id="status" class="status hidden"></div>
    </div>
  </div>
  <script type="module" src="sidebar.js"></script>
</body>
</html>
