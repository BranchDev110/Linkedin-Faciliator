name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          IMAGE="${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        env:
          REGISTRY: ghcr.io
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:production
            ${{ env.IMAGE }}:production-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ secrets.PRODUCTION_APP_PATH }}
          APP_IMAGE: ${{ env.IMAGE }}:production
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: APP_PATH,APP_IMAGE,GHCR_READ_TOKEN,GHCR_USER
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${APP_PATH:-}" ]; then
              echo "PRODUCTION_APP_PATH secret is not set." >&2
              exit 1
            fi

            cd "${APP_PATH}"

            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            fi

            git fetch origin production
            git checkout production
            git pull --ff-only origin production

            export APP_IMAGE
            export ENVIRONMENT=production
            bash deploy/scripts/remote-deploy.sh production

            echo "Verifying public health endpoint ..."
            curl -fsS http://127.0.0.1:3002/api/health
            echo ""
            echo "Production deploy succeeded."
